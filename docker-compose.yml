services:
  nginx:
    image: nginx:1.31.2-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - masterly

  api:
    build: ./backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DEBUG: ${DEBUG:-true}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: masterly
      DB_USER: masterly
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: masterly-documents
      MEILI_HOST: http://meilisearch:7700
      MEILI_KEY: ${MEILI_KEY:-masterkey}
      ALLOWED_HOSTS: 185.185.80.188,localhost,127.0.0.1,api,172.20.10.2
      CORS_ALLOWED_ORIGINS: http://185.185.80.188:7788,http://localhost,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - masterly

  celery:
    build: ./backend
    command: celery -A config worker -l info
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-key-change-in-production}
      DEBUG: ${DEBUG:-false}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: masterly
      DB_USER: masterly
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-secret}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - masterly

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - masterly

  db:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: masterly
      POSTGRES_USER: masterly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U masterly -d masterly"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - masterly

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - masterly

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - masterly

  meilisearch:
    image: getmeili/meilisearch:v1.13.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      MEILI_MASTER_KEY: ${MEILI_KEY:-masterkey}
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    networks:
      - masterly

  backup:
    image: postgres:17.10-alpine
    command: |
      sh -c 'while true; do
        pg_dump -h db -U masterly -d masterly | gzip > /backups/backup_$$(date +%Y%m%d_%H%M).sql.gz;
        find /backups -name "*.sql.gz" -mtime +30 -delete;
        sleep 86400;
      done'
    environment:
      PGPASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - masterly
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  backup_data:

networks:
  masterly:
    driver: bridge
